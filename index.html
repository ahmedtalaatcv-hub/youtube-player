<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube Search &amp; Player</title>

<style>
  /* ===========================================================
     المتغيرات العامة (Design Tokens) - وضع داكن احترافي
  =========================================================== */
  :root {
    --bg-primary: #0f0f13;
    --bg-secondary: #16161c;
    --bg-card: #1c1c24;
    --bg-card-hover: #23232d;
    --accent: #ff3b3b;
    --accent-hover: #ff5757;
    --accent-soft: rgba(255, 59, 59, 0.15);
    --text-primary: #f4f4f6;
    --text-secondary: #9a9aa5;
    --text-muted: #6b6b76;
    --border: #2a2a34;
    --success: #3ddc97;
    --danger: #ff4d4d;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    --transition: all 0.25s ease;
    font-family: "Segoe UI", "Tajawal", -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at top, #1a1a22 0%, #0b0b0f 70%);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ===========================================================
     الهيدر
  =========================================================== */
  header {
    padding: 28px 20px 20px;
    text-align: center;
    background: linear-gradient(180deg, rgba(255,59,59,0.08), transparent);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  header h1 span.logo {
    color: var(--accent);
    font-size: 2.1rem;
  }

  header p {
    color: var(--text-secondary);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  /* ===========================================================
     شريط البحث
  =========================================================== */
  .search-wrapper {
    max-width: 720px;
    margin: 26px auto 10px;
    padding: 0 20px;
  }

  .search-box {
    display: flex;
    gap: 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px;
    box-shadow: var(--shadow);
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 1rem;
    padding: 10px 14px;
  }

  .search-box input::placeholder {
    color: var(--text-muted);
  }

  .search-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 0 22px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search-box button:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .search-box button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* ===========================================================
     حالات النظام: تحميل / خطأ / فارغ
  =========================================================== */
  .status-box {
    max-width: 720px;
    margin: 18px auto;
    padding: 16px 20px;
    text-align: center;
  }

  .loading-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-box {
    background: linear-gradient(135deg, rgba(255,77,77,0.12), rgba(255,77,77,0.04));
    border: 1px solid rgba(255,77,77,0.35);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    color: #ffb3b3;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    font-size: 0.92rem;
    animation: fadeIn 0.3s ease;
  }

  .error-box .icon {
    font-size: 1.3rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 0.95rem;
  }

  /* ===========================================================
     شبكة نتائج البحث
  =========================================================== */
  .results-grid {
    max-width: 1200px;
    margin: 10px auto;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .video-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.4s ease;
  }

  .video-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: rgba(255,59,59,0.3);
  }

  .thumb-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
  }

  .thumb-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .duration-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 5px;
  }

  .card-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .video-title {
    font-size: 0.98rem;
    font-weight: 700;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 2.6em;
  }

  .channel-name {
    color: var(--text-secondary);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .play-btn {
    margin-top: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(255,59,59,0.3);
    border-radius: var(--radius-sm);
    padding: 9px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .play-btn:hover {
    background: var(--accent);
    color: #fff;
  }

  /* ===========================================================
     نافذة المشغل (Player Modal)
  =========================================================== */
  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeIn 0.25s ease;
  }

  .player-overlay.hidden {
    display: none;
  }

  .player-modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 900px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }

  .player-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .player-header h3 {
    font-size: 1rem;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .player-header .controls {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: var(--transition);
  }

  .icon-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .icon-btn.refresh:hover {
    animation: spin 0.6s linear;
  }

  .player-body {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }

  #playerFrame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .player-status {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(10,10,14,0.92);
    color: var(--text-secondary);
    text-align: center;
    padding: 20px;
  }

  .player-status.hidden {
    display: none;
  }

  .player-status .spinner {
    width: 34px;
    height: 34px;
    border-width: 4px;
  }

  .player-status .retry-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
  }

  .player-status .retry-btn:hover {
    background: var(--accent-hover);
  }

  .player-footer {
    padding: 12px 18px;
    color: var(--text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    margin-left: 5px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===========================================================
     Responsive
  =========================================================== */
  @media (max-width: 600px) {
    header h1 { font-size: 1.5rem; }
    .search-box { flex-direction: row; }
    .search-box button { padding: 0 16px; font-size: 0.9rem; }
    .results-grid { grid-template-columns: 1fr; padding: 10px 14px; }
    .player-modal { max-width: 100%; }
    .player-footer { font-size: 0.72rem; }
  }
</style>
</head>
<body>

  <!-- ==========================================================
       الهيدر
  =========================================================== -->
  <header>
    <h1><span class="logo">▶</span> YouTube Explorer</h1>
    <p>ابحث عن أي فيديو وشغّله مباشرة داخل الصفحة</p>
  </header>

  <!-- ==========================================================
       شريط البحث
  =========================================================== -->
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن فيديو، قناة، أو موضوع..." autocomplete="off" />
      <button id="searchBtn">🔍 Search</button>
    </div>
  </div>

  <!-- منطقة الحالة (تحميل / خطأ) -->
  <div class="status-box" id="statusBox"></div>

  <!-- شبكة النتائج -->
  <div class="results-grid" id="resultsGrid"></div>

  <!-- ==========================================================
       نافذة المشغل المنبثقة
  =========================================================== -->
  <div class="player-overlay hidden" id="playerOverlay">
    <div class="player-modal">
      <div class="player-header">
        <h3 id="playerTitle">عنوان الفيديو</h3>
        <div class="controls">
          <button class="icon-btn refresh" id="refreshStreamBtn" title="🔄 Refresh Stream">🔄</button>
          <button class="icon-btn" id="closePlayerBtn" title="إغلاق">✕</button>
        </div>
      </div>
      <div class="player-body">
        <video
          id="playerFrame"
          controls
          autoplay
          playsinline
          preload="auto"
          style="width:100%;height:100%;background:black"></video>
        <div class="player-status" id="playerStatus">
          <div class="spinner"></div>
          <span>جاري استخراج رابط البث...</span>
        </div>
      </div>
      <div class="player-footer">
        <span><span class="live-dot"></span> تشغيل مباشر</span>
        <span id="channelFooter">—</span>
      </div>
    </div>
  </div>

<script>
/* =====================================================================
   ملاحظة هامة حول استخراج رابط البث:
   -------------------------------------------------------------------
   هذا التطبيق لا يعتمد على أي واجهة برمجية من جوجل/يوتيوب إطلاقاً
   (لا YouTube Data API، ولا YouTube IFrame Player API، ولا أي Google API).
   بدلاً من ذلك يعتمد التطبيق بالكامل على خادم محلي (server.js) يوفر
   نقطتي وصول:
     - GET /ytsearch?q=...   لجلب نتائج البحث.
     - GET /youtube?url=...  لاستخراج رابط بث مباشر (googlevideo) وتشغيله
       داخل عنصر <video> فعلي في الصفحة.
   نظراً لأن روابط googlevideo مؤقتة وتنتهي صلاحيتها، يقوم التطبيق
   تلقائياً بإعادة طلبها من الخادم المحلي عند حدوث خطأ أثناء التشغيل،
   وذلك دون إعادة تحميل الصفحة.
===================================================================== */

/* =========================================================
   1) إعدادات عامة - عنوان الخادم المحلي (server.js)
========================================================= */
const CONFIG = {
  API_BASE: "",
  MAX_RESULTS: 12,
};

/* =========================================================
   2) طبقة الاتصال بالخادم المحلي (server.js)
========================================================= */
class YouTubeAPIService {
  constructor(apiBase) {
    this.apiBase = apiBase;
  }

  /**
   * البحث عن الفيديوهات حسب كلمة مفتاحية
   * يستخدم GET /ytsearch?q=...
   */
  async searchVideos(query) {
    const searchUrl = `${this.apiBase}/ytsearch?q=${encodeURIComponent(query)}`;

    const searchRes = await fetch(searchUrl);
    if (!searchRes.ok) {
      throw new Error(await this.#extractErrorMessage(searchRes));
    }
    const searchData = await searchRes.json();
    const results = Array.isArray(searchData.results) ? searchData.results : [];

    return results.map((item) => ({
      id: item.videoId,
      title: item.title,
      channel: item.channelTitle,
      thumbnail: item.thumbnail || "",
      duration: item.duration || "00:00",
    }));
  }

  /**
   * جلب رابط البث المباشر (googlevideo) لفيديو معيّن
   * يستخدم GET quality=18https://www.youtube.com/watch?v=VIDEO_ID
   */
  async fetchStream(videoId) {
    const watchUrl = `https://www.youtube.com/watch?v=${videoId}`;
    const streamUrl = `${this.apiBase}/youtube?url=${encodeURIComponent(watchUrl)}`;

    const res = await fetch(streamUrl);
    if (!res.ok) {
      throw new Error(await this.#extractErrorMessage(res));
    }
    const data = await res.json();

    if (!data.stream) {
      throw new Error("لم يُرجع الخادم رابط بث صالحًا لهذا الفيديو.");
    }

    return data;
  }

  async #extractErrorMessage(response) {
    try {
      const errJson = await response.json();
      return errJson.error || errJson.message || `HTTP ${response.status}`;
    } catch {
      return `HTTP ${response.status}`;
    }
  }
}

/* =========================================================
   4) طبقة عرض النتائج (Results Renderer)
========================================================= */
class ResultsRenderer {
  constructor(gridElement, statusElement, onPlay) {
    this.grid = gridElement;
    this.status = statusElement;
    this.onPlay = onPlay;
  }

  showLoading(message = "جاري البحث عن الفيديوهات...") {
    this.grid.innerHTML = "";
    this.status.innerHTML = `
      <div class="loading-msg">
        <div class="spinner"></div>
        <span>${message}</span>
      </div>`;
  }

  showError(message) {
    this.grid.innerHTML = "";
    this.status.innerHTML = `
      <div class="error-box">
        <span class="icon">⚠️</span>
        <span>${message}</span>
      </div>`;
  }

  clearStatus() {
    this.status.innerHTML = "";
  }

  showEmpty() {
    this.grid.innerHTML = `<div class="empty-state">لم يتم العثور على نتائج مطابقة. جرّب كلمات بحث مختلفة.</div>`;
  }

  render(videos) {
    this.clearStatus();

    if (!videos || videos.length === 0) {
      this.showEmpty();
      return;
    }

    this.grid.innerHTML = "";
    const fragment = document.createDocumentFragment();

    videos.forEach((video) => {
      const card = document.createElement("div");
      card.className = "video-card";
      card.innerHTML = `
        <div class="thumb-wrapper">
          <img src="${video.thumbnail}" alt="${this.#escape(video.title)}" loading="lazy" />
          <span class="duration-badge">${video.duration}</span>
        </div>
        <div class="card-body">
          <div class="video-title">${this.#escape(video.title)}</div>
          <div class="channel-name">📺 ${this.#escape(video.channel)}</div>
          <button class="play-btn">▶ Play</button>
        </div>
      `;

      const playBtn = card.querySelector(".play-btn");
      playBtn.addEventListener("click", () => this.onPlay(video));

      fragment.appendChild(card);
    });

    this.grid.appendChild(fragment);
  }

  #escape(text) {
    const div = document.createElement("div");
    div.textContent = text ?? "";
    return div.innerHTML;
  }
}

/* =========================================================
   5) طبقة المشغل (Player Controller)
   تدير نافذة التشغيل، استخراج/تحديث رابط البث، والأخطاء
========================================================= */
class PlayerController {
  constructor(api) {
    this.api = api;
    this.overlay = document.getElementById("playerOverlay");
    this.video = document.getElementById("playerFrame");
    this.statusBox = document.getElementById("playerStatus");
    this.titleEl = document.getElementById("playerTitle");
    this.channelEl = document.getElementById("channelFooter");
    this.refreshBtn = document.getElementById("refreshStreamBtn");
    this.closeBtn = document.getElementById("closePlayerBtn");

    this.currentVideo = null;
    this.retryCount = 0;
    this.maxAutoRetries = 3;
    this.watchdogTimer = null;
    this.isLoading = false;

    this.#bindEvents();
  }

  #bindEvents() {
    this.closeBtn.addEventListener("click", () => this.close());
    this.refreshBtn.addEventListener("click", () => this.refreshStream());

    // إغلاق عند الضغط خارج النافذة
    this.overlay.addEventListener("click", (e) => {
      if (e.target === this.overlay) this.close();
    });

    // الفيديو أصبح جاهزًا للتشغيل: نخفي رسالة التحميل/الخطأ
    this.video.addEventListener("playing", () => this.#hideStatus());
    this.video.addEventListener("canplay", () => this.#hideStatus());

    // اكتشاف انتهاء صلاحية رابط googlevideo أو أي خطأ أثناء التشغيل،
    // وإعادة استخراج رابط جديد تلقائياً دون إعادة تحميل الصفحة
    this.video.addEventListener("error", () => {
      if (this.overlay.classList.contains("hidden") || this.isLoading) return;
      this.#autoRetryOrFail("انقطع البث أو انتهت صلاحية رابط الفيديو.");
    });
    this.video.addEventListener("stalled", () => {
      if (this.overlay.classList.contains("hidden") || this.isLoading) return;
      this.#autoRetryOrFail("توقف البث بشكل غير متوقع.");
    });
  }

  /**
   * فتح المشغل وطلب رابط البث الحالي للفيديو من الخادم المحلي
   */
  async open(video) {
    this.currentVideo = video;
    this.retryCount = 0;
    this.titleEl.textContent = video.title;
    this.channelEl.textContent = "📺 " + video.channel;
    this.overlay.classList.remove("hidden");
    document.body.style.overflow = "hidden";

    await this.#loadStream();
  }

  close() {
    this.overlay.classList.add("hidden");
    document.body.style.overflow = "";
    this.#clearWatchdog();
    this.video.pause();
    this.video.removeAttribute("src");
    this.video.load();
    this.currentVideo = null;
  }

  /**
   * زر Refresh Stream: يعيد طلب رابط بث جديد من /youtube ويشغّله يدوياً
   */
  async refreshStream() {
    if (!this.currentVideo) return;
    this.retryCount = 0;
    await this.#loadStream();
  }

  /**
   * يطلب رابط بث جديد من GET /youtube ويضعه داخل video.src ثم يشغّله
   */
  async #loadStream() {
    if (!this.currentVideo?.id) {
      this.#showError("مُعرّف الفيديو غير صالح.");
      return;
    }

    this.isLoading = true;
    this.#showLoading();
    this.#clearWatchdog();

    try {
      const data = await this.api.fetchStream(this.currentVideo.id);

      this.video.src = data.stream;
      this.video.load();

      try {
        await this.video.play();
      } catch {
        // قد يمنع المتصفح التشغيل التلقائي؛ يبقى المستخدم قادراً على الضغط على تشغيل
      }

      this.isLoading = false;
      this.#startWatchdog();
    } catch (err) {
      this.isLoading = false;
      this.#showError(err.message || "فشل استخراج رابط البث.");
    }
  }

  /**
   * مراقب (Watchdog) يتحقق من أن التشغيل بدأ فعلياً خلال مهلة معقولة،
   * ويحاول إعادة استخراج رابط جديد تلقائياً عند اكتشاف مشكلة.
   */
  #startWatchdog() {
    this.#clearWatchdog();
    this.watchdogTimer = setTimeout(() => {
      if (this.statusBox.classList.contains("hidden")) return;
      this.#autoRetryOrFail("انتهت مهلة تحميل البث.");
    }, 15000);
  }

  #clearWatchdog() {
    if (this.watchdogTimer) {
      clearTimeout(this.watchdogTimer);
      this.watchdogTimer = null;
    }
  }

  /**
   * عند فشل التحميل أو انتهاء صلاحية رابط googlevideo أثناء التشغيل:
   * يحاول التطبيق إعادة الاستخراج تلقائياً حتى maxAutoRetries مرات،
   * وبعدها يعرض رسالة خطأ مع زر يدوي.
   */
  async #autoRetryOrFail(reasonMessage) {
    this.#clearWatchdog();

    if (this.retryCount < this.maxAutoRetries) {
      this.retryCount++;
      this.#showLoading(`${reasonMessage} جاري إعادة استخراج الرابط تلقائياً (${this.retryCount}/${this.maxAutoRetries})...`);
      await this.#loadStream();
    } else {
      this.#showError(`${reasonMessage} يمكنك الضغط على "🔄 Refresh Stream" للمحاولة يدوياً.`);
    }
  }

  #showLoading(message = "جاري استخراج رابط البث...") {
    this.statusBox.classList.remove("hidden");
    this.statusBox.innerHTML = `
      <div class="spinner"></div>
      <span>${message}</span>
    `;
  }

  #showError(message) {
    this.statusBox.classList.remove("hidden");
    this.statusBox.innerHTML = `
      <span style="font-size:1.8rem;">⚠️</span>
      <span>${message}</span>
      <button class="retry-btn" id="innerRetryBtn">🔄 Refresh Stream</button>
    `;
    const retryBtn = document.getElementById("innerRetryBtn");
    retryBtn?.addEventListener("click", () => this.refreshStream());
  }

  #hideStatus() {
    this.statusBox.classList.add("hidden");
  }
}

/* =========================================================
   6) وحدة التحكم الرئيسية للتطبيق (App Controller)
   تربط بين البحث، العرض، والمشغل
========================================================= */
class YouTubeExplorerApp {
  constructor() {
    this.searchInput = document.getElementById("searchInput");
    this.searchBtn = document.getElementById("searchBtn");
    this.statusBox = document.getElementById("statusBox");
    this.resultsGrid = document.getElementById("resultsGrid");

    this.api = new YouTubeAPIService(CONFIG.API_BASE);
    this.player = new PlayerController(this.api);
    this.renderer = new ResultsRenderer(
      this.resultsGrid,
      this.statusBox,
      (video) => this.player.open(video)
    );

    this.#bindEvents();
  }

  #bindEvents() {
    this.searchBtn.addEventListener("click", () => this.performSearch());

    // البحث بالضغط على Enter دون إعادة تحميل الصفحة
    this.searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        this.performSearch();
      }
    });
  }

  /**
   * تنفيذ عملية البحث بالكامل (async/await + fetch)
   */
  async performSearch() {
    const query = this.searchInput.value.trim();

    if (!query) {
      this.renderer.showError("الرجاء إدخال كلمة بحث أولاً.");
      return;
    }

    this.#setSearching(true);
    this.renderer.showLoading("جاري البحث عن الفيديوهات...");

    try {
      const videos = await this.api.searchVideos(query);
      this.renderer.render(videos);
    } catch (err) {
      this.renderer.showError(err.message || "حدث خطأ غير متوقع أثناء البحث.");
    } finally {
      this.#setSearching(false);
    }
  }

  #setSearching(isSearching) {
    this.searchBtn.disabled = isSearching;
    this.searchBtn.textContent = isSearching ? "⏳ جاري البحث..." : "🔍 Search";
  }
}

/* =========================================================
   7) تشغيل التطبيق بعد اكتمال تحميل DOM
========================================================= */
document.addEventListener("DOMContentLoaded", () => {
  new YouTubeExplorerApp();
});
</script>
</body>
